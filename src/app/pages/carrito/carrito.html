<div class="container">
  <h2>Carrito de compras</h2>
<p>Items: {{ carritoService.carrito().length }}</p>
  <div *ngFor="let producto of carritoService.carrito(); let i = index">

    <h3>{{ producto.nombre }}</h3>
    <p>{{ producto.precio | currency }}</p>

    <button (click)="eliminar(i)">Eliminar</button>

  </div>

  <h3>Total: {{ carritoService.total() | currency }}</h3>
</div>
