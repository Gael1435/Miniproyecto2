<div class="carrito-container">

  <h1>Carrito de Compras</h1>

  <div *ngIf="carritoService.carrito().length > 0; else vacio">

    <div class="item"
      *ngFor="let producto of carritoService.carrito()">

      <img [src]="producto.imagen">

      <div class="info">

        <h2>{{ producto.nombre }}</h2>

        <p>{{ producto.precio | currency:'MXN' }}</p>

        <p>Cantidad: {{ producto.cantidad }}</p>

        <p>
          Subtotal:
          {{ producto.precio * producto.cantidad | currency:'MXN' }}
        </p>

      </div>

      <button (click)="eliminar(producto.id)">
        Eliminar
      </button>

    </div>

    <h2 class="total">
      Total: {{ carritoService.total() | currency:'MXN' }}
    </h2>

  </div>

  <ng-template #vacio>
    <h2>Carrito vacío</h2>
  </ng-template>

</div>
