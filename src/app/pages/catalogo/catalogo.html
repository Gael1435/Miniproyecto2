<div class="container">
  <h2>Catálogo de Productos</h2>

  <div *ngFor="let producto of productos" class="card">
    <img [src]="producto.imagen" width="150">

    <h3>{{ producto.nombre }}</h3>
    <p>{{ producto.marca }}</p>

    <p><strong>{{ producto.precio | currency }}</strong></p>

    <button (click)="verDetalle(producto.id)">
      Ver detalle
    </button>

    <button (click)="agregarCarrito(producto)">
  🛒 Agregar al carrito
</button>
<p>Items: {{ carritoService.carrito().length }}</p>

  </div>
</div>
