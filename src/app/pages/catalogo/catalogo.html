<div class="container">

  <h2>Catálogo de Productos</h2>

  <div
    *ngFor="let producto of productos"
    class="bloque-producto"
  >

    <app-tarjeta-producto
      [producto]="producto">
    </app-tarjeta-producto>

    <div class="acciones">

      <button
        (click)="verDetalle(producto.id)">
        Ver detalle
      </button>

      <button
        (click)="agregarCarrito(producto)">
        Agregar carrito
      </button>

    </div>

  </div>

</div>
