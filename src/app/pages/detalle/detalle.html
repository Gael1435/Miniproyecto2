<div class="detalle-container" *ngIf="producto as p">

  <div class="detalle-card">

    <img
      [src]="p.imagen"
      class="detalle-img"
    >

    <div class="detalle-info">

      <h1>{{ p.nombre }}</h1>

      <p><strong>Marca:</strong> {{ p.marca }}</p>

      <p class="precio">
        {{ p.precio | currency:'MXN' }}
      </p>

      <div class="descripcion">
        {{ p.descripcion }}
      </div>

    </div>

  </div>

</div>
